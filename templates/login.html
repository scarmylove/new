<!DOCTYPE html>
<html>
<head>
<title>Login - {{ settings.system_name or 'SPOMS' }}</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="robots" content="noindex, nofollow">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI';
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("{{ url_for('static', filename='images/spoms.png') }}");

background-size:cover;
background-position:62% 38%;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* LOGIN CARD */

.card{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
width:100%;
max-width:400px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
text-align:center;
}

/* SPOMS TITLE */

.card h1{
color:#2563eb;
font-size:36px;
margin-bottom:10px;
letter-spacing:2px;
}

/* SYSTEM TITLE */

.system-title{

font-size:16px;
font-weight:900;
letter-spacing:2px;
text-transform:uppercase;

background:linear-gradient(
90deg,
#ffffff,
#60a5fa,
#3b82f6,
#ffffff
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:lightMove 6s linear infinite;

margin-bottom:30px;
}

/* ANIMATION */

@keyframes lightMove{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}

/* FORM */

.form-group{
margin-bottom:20px;
text-align:left;
}

.form-group label{
display:block;
font-weight:600;
margin-bottom:8px;
color:#1f2937;
}

.form-group input{
width:100%;
padding:12px;
border:2px solid #e5e7eb;
border-radius:8px;
font-size:14px;
transition:0.3s;
}

.form-group input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.1);
}

/* BUTTON */

.btn{
width:100%;
padding:12px;
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

/*==Back to home page ==*/
.back-btn{
display:inline-block;
margin-bottom:20px;
padding:8px 16px;

background:#e5e7eb;
color:#1f2937;

text-decoration:none;
border-radius:6px;

font-size:14px;
font-weight:600;

transition:0.3s;
}

.back-btn:hover{
background:#2563eb;
color:white;
transform:translateY(-2px);
}

/* ERROR */

.error{
background:#fee2e2;
color:#7f1d1d;
padding:12px;
border-radius:8px;
margin-bottom:20px;
}

</style>
</head>


<body>

<div class="card">

<h1>{{ settings.system_name or 'SPOMS' }}</h1>

<p class="system-title">
SUPPLIER & PURCHASE ORDER MANAGEMENT SYSTEM
</p>
<a href="{{ url_for('home') }}" class="back-btn">
← Back to Homepage
</a>
{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST" autocomplete="off">

<div class="form-group">
<label>Username</label>
<input type="text" name="username" required autofocus autocomplete="off">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required autocomplete="off">
</div>

<button class="btn">Login</button>

</form>

</div>

<script>
    // Function to clear login fields
    function clearLoginFields() {
        const usernameField = document.querySelector('input[name="username"]');
        const passwordField = document.querySelector('input[name="password"]');
        
        // Only clear if fields are empty or seem to be autofilled
        if (usernameField && (!usernameField.value || document.activeElement !== usernameField)) {
            usernameField.value = '';
            usernameField.defaultValue = '';
        }
        if (passwordField && (!passwordField.value || document.activeElement !== passwordField)) {
            passwordField.value = '';
            passwordField.defaultValue = '';
        }
    }
    
    // Track if user has started typing
    let userHasTyped = false;
    
    // Clear fields only on initial page load
    window.addEventListener('load', function() {
        if (!userHasTyped) {
            clearLoginFields();
        }
    });
    
    // Clear on DOM ready (only if not typed)
    document.addEventListener('DOMContentLoaded', function() {
        if (!userHasTyped) {
            setTimeout(function() {
                if (!userHasTyped) {
                    clearLoginFields();
                }
            }, 100);
        }
    });
    
    // Clear when page becomes visible (user navigates back) - only if not typed
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden && !userHasTyped) {
            setTimeout(function() {
                if (!userHasTyped) {
                    clearLoginFields();
                }
            }, 100);
        }
    });
    
    // Clear when window gets focus - only if not typed
    window.addEventListener('focus', function() {
        if (!userHasTyped) {
            setTimeout(function() {
                if (!userHasTyped) {
                    clearLoginFields();
                }
            }, 100);
        }
    });
    
    // Track when user starts typing
    document.addEventListener('input', function(e) {
        if (e.target.name === 'username' || e.target.name === 'password') {
            userHasTyped = true;
        }
    });
    
    // Reset typing flag when page is reloaded/refreshed
    window.addEventListener('beforeunload', function() {
        userHasTyped = false;
    });
</script>

</body>
</html>
