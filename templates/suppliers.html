{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <div>
        <h1><i class="fas fa-industry"></i> Suppliers</h1>
        <p>Manage your suppliers</p>
    </div>
    {% if role in ['Administrator', 'Store Owner'] %}
    <button class="btn btn-primary" id="addBtn" onclick="openModal('supplier')">
        <i class="fas fa-plus"></i> Add Supplier
    </button>
    {% endif %}
</div>

<div class="search-container">
    <input type="text" id="search" placeholder="Search..." class="search-input" onkeyup="filterTable()">
    <select id="filter" class="filter-select" onchange="filterTable()">
        <option value="">All Status</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
    </select>
</div>

<div class="table-container">
    <table id="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add Supplier</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <form class="form" onsubmit="addSupplier(event)">
            <div class="form-group">
                <label>ID *</label>
                <input type="text" id="id" required>
            </div>
            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Contact</label>
                <input type="text" id="contact">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea id="address" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</div>

<script>
    const userRole = '{{ role }}';
    
    function loadSuppliers() {
        fetch('/api/suppliers').then(r => r.json()).then(data => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = data.map(s => {
                const canEdit = userRole === 'Administrator' || userRole === 'Store Owner';
                const actions = canEdit ? `
                    <button class="btn-icon" onclick="editSupplier('${s.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon" style="color: #dc2626;" onclick="deleteSupplier('${s.id}')"><i class="fas fa-trash"></i></button>
                ` : '';
                return `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.contact}</td>
                        <td>${s.email}</td>
                        <td>${s.phone}</td>
                        <td><span class="badge ${s.status.toLowerCase()}">${s.status}</span></td>
                        <td>${actions}</td>
                    </tr>
                `;
            }).join('');
        });
    }
    
    function editSupplier(id) {
        // Find the supplier data
        fetch('/api/suppliers').then(r => r.json()).then(data => {
            const supplier = data.find(s => s.id === id);
            if (supplier) {
                // Populate the modal with existing data
                document.getElementById('id').value = supplier.id;
                document.getElementById('id').readOnly = true; // Make ID readonly when editing
                document.getElementById('name').value = supplier.name;
                document.getElementById('contact').value = supplier.contact || '';
                document.getElementById('email').value = supplier.email;
                document.getElementById('phone').value = supplier.phone || '';
                document.getElementById('address').value = supplier.address || '';
                
                // Change modal title and button
                document.querySelector('.modal-header h2').textContent = 'Edit Supplier';
                document.querySelector('button[type="submit"]').textContent = 'Update';
                
                // Change form submission to update
                document.querySelector('.form').onsubmit = (e) => updateSupplier(e, id);
                
                openModal();
            }
        });
    }
    
    function updateSupplier(e, id) {
        e.preventDefault();
        const data = {
            name: document.getElementById('name').value,
            contact: document.getElementById('contact').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            status: 'Active'
        };
        fetch(`/api/suppliers/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
            .then(r => {
                if (r.ok) {
                    closeModal(); 
                    loadSuppliers(); 
                    alert('Supplier updated!');
                } else {
                    alert('Failed to update supplier');
                }
            });
    }
    
    function addSupplier(e) {
        e.preventDefault();
        const data = {
            id: document.getElementById('id').value,
            name: document.getElementById('name').value,
            contact: document.getElementById('contact').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            status: 'Active'
        };
        fetch('/api/suppliers', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(data) 
        })
        .then(r => r.json())
        .then(result => {
            if (result.success) {
                closeModal(); 
                loadSuppliers(); 
                alert('Supplier added successfully!');
            } else {
                alert('Failed to add supplier: ' + (result.error || 'Unknown error'));
            }
        })
        .catch(error => {
            alert('Error adding supplier: ' + error.message);
        });
    }
    
    function deleteSupplier(id) {
        if (confirm('Delete?')) {
            fetch(`/api/suppliers/${id}`, { method: 'DELETE' }).then(() => loadSuppliers());
        }
    }
    
    function openModal() { 
        // Reset modal for adding
        document.querySelector('.modal-header h2').textContent = 'Add Supplier';
        document.querySelector('button[type="submit"]').textContent = 'Save';
        document.querySelector('.form').onsubmit = addSupplier;
        
        // Clear form and make ID editable
        document.getElementById('id').value = '';
        document.getElementById('id').readOnly = false;
        document.getElementById('name').value = '';
        document.getElementById('contact').value = '';
        document.getElementById('email').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('address').value = '';
        
        document.getElementById('modal').classList.add('show'); 
    }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    function filterTable() {
        const search = document.getElementById('search').value.toLowerCase();
        const filter = document.getElementById('filter').value;
        document.querySelectorAll('#tbody tr').forEach(row => {
            const text = row.textContent.toLowerCase();
            const status = row.querySelector('.badge')?.textContent || '';
            const match = text.includes(search) && (!filter || status === filter);
            row.style.display = match ? '' : 'none';
        });
    }
    
    loadSuppliers();
</script>

<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }
    .page-header div {
        flex: 1;
    }
</style>
{% endblock %}
